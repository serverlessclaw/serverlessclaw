name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-and-test:
    name: Quality Checks & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Install Providers & Generate Types
        run: pnpm exec sst install
        env:
          AWS_ACCESS_KEY_ID: mock-key
          AWS_SECRET_ACCESS_KEY: mock-secret
          AWS_REGION: ap-southeast-2

      - name: Run Quality Checks
        run: make check

      - name: Run Unit Tests
        run: make test-silent

      - name: Run AIReady Scan
        run: make aiready
