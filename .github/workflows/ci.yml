name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [lint, format-check, type-check, test-silent, test-coverage, aiready]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Install Providers & Generate Types
        run: pnpm exec sst install
        env:
          AWS_ACCESS_KEY_ID: mock-key
          AWS_SECRET_ACCESS_KEY: mock-secret
          AWS_REGION: ap-southeast-2

      - name: Quality Check (${{ matrix.task }})
        run: pnpm exec turbo run ${{ matrix.task }}
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
