name: Sync with ServerlessClaw Hub

on:
  schedule:
    - cron: '0 0 * * *' # Every night
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Claw Sync
        run: |
          npx @serverlessclaw/cli claw-sync --hub serverlessclaw/serverlessclaw --prefix core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OSS users can provide their LLM key if they want agentic resolution
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'chore: sync with serverlessclaw hub'
          body: 'Automated synchronization with the Mother Hub repository.'
          branch: 'evolution/sync-hub'
