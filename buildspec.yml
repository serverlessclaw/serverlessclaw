version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm install -g pnpm
      - pnpm install
  pre_build:
    commands:
      - |
        if [ "$EMERGENCY_ROLLBACK" = "true" ]; then
          echo "EMERGENCY ROLLBACK INITIATED: Reverting last commit..."
          git config --global user.email "agent@serverlessclaw.local"
          git config --global user.name "Emergency Agent"
          git revert HEAD --no-edit
        fi
  build:
    commands:
      - echo "Starting autonomous deployment..."
      - npx sst deploy --stage $SST_STAGE
artifacts:
  files:
    - '**/*'
