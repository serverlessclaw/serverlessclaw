version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 24
    commands:
      - mkdir -p /tmp/ci-logs
      - npm install -g pnpm
      - echo "Installing dependencies and Playwright in parallel..."
      - (pnpm install) &
      - PNPM_PID=$!
      - (npx playwright install --with-deps chromium) &
      - PW_PID=$!
      - wait $PNPM_PID && wait $PW_PID
  pre_build:
    commands:
      - |
        if [ "$EMERGENCY_ROLLBACK" = "true" ]; then
          echo "EMERGENCY ROLLBACK INITIATED"
          git config --global user.email "agent@serverlessclaw.local"
          git config --global user.name "Emergency Agent"
          if [ -n "$LKG_HASH" ] && [ "$LKG_HASH" != "dev" ]; then
            echo "Reverting to Last Known Good (LKG) state: $LKG_HASH"
            git fetch origin main --depth=50
            git checkout $LKG_HASH
          else
            echo "No LKG_HASH found or hash is 'dev'. Reverting last commit (HEAD^)..."
            git revert HEAD --no-edit
          fi
        fi
      - |
        if [ -n "$STAGING_BUCKET_NAME" ]; then
          STAGING_ZIP="${STAGING_ZIP_KEY:-staged_changes.zip}"
          echo "Checking for staged changes in S3: $STAGING_BUCKET_NAME/$STAGING_ZIP"
          aws s3 cp s3://$STAGING_BUCKET_NAME/$STAGING_ZIP staged_changes.zip || echo "No staged changes found."
          if [ -f "staged_changes.zip" ]; then
            echo "Applying staged changes..."
            unzip -o staged_changes.zip || { echo "ERROR: Failed to unzip staged changes." && exit 1; }
            rm staged_changes.zip
          fi
        fi
      - |
        if [ "$SYNC_ONLY" = "true" ]; then
          echo "SYNC_ONLY mode: Skipping build and deploy phases."
        fi
  build:
    commands:
      - |
        if [ "$SYNC_ONLY" != "true" ]; then
          echo "Starting autonomous deployment and quality gate (Tier 1) in parallel..."
          make gate-deploy > /tmp/ci-logs/gate-deploy.log 2>&1 &
          GATE_PID=$!
          make deploy ENV=$SST_STAGE > /tmp/ci-logs/deploy.log 2>&1
          DEPLOY_EXIT=$?
          wait $GATE_PID
          GATE_EXIT=$?
          if [ $DEPLOY_EXIT -ne 0 ] || [ $GATE_EXIT -ne 0 ]; then
            echo "Build failed: Deploy Exit=$DEPLOY_EXIT, Gate Exit=$GATE_EXIT"
            # Move logs to current dir for artifact collection before exiting
            cp /tmp/ci-logs/*.log . || true
            npx tsx scripts/ci/generate-manifest.ts /tmp/ci-logs .
            exit 1
          fi
        fi
  post_build:
    commands:
      - |
        if [ "$EMERGENCY_ROLLBACK" = "true" ]; then
          echo "Verifying emergency recovery..."
          # Extract API URL for verification
          API_URL=$(python3 -c "import json,os; print(json.load(open('.sst/outputs.json'))['apiUrl'])" 2>/dev/null || echo "")
          if [ -n "$API_URL" ]; then
            make verify URL=$API_URL || (echo "EMERGENCY RECOVERY VERIFICATION FAILED" && exit 1)
          else
            echo "WARNING: Could not determine API URL from .sst/outputs.json. Skipping verification."
          fi
        fi
      - echo build completed on `date`
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ] && [ "$SYNC_ONLY" != "true" ]; then
          echo "Deployment successful. Running post-deploy checks..."
          API_URL=$(python3 -c "import json; print(json.load(open('.sst/outputs.json'))['apiUrl'])")

          echo "Running Tier 3 verification (Health + E2E) in parallel..."
          make test-tier-3 URL=$API_URL > /tmp/ci-logs/test-tier-3.log 2>&1
          TEST_TIER_3_EXIT=$?
          if [ $TEST_TIER_3_EXIT -ne 0 ]; then
            echo "ERROR: Tier 3 verification failed. Blocking trunk sync."
            npx tsx scripts/ci/generate-manifest.ts /tmp/ci-logs .
            exit 1
          fi
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ] && [ "$SYNC_ONLY" != "true" ]; then
          echo "Running release-minimum blocking checks (tests + security + docs)..."
          make test > /tmp/ci-logs/test.log 2>&1 || {
            echo "ERROR: Unit test suite failed."
            npx tsx scripts/ci/generate-manifest.ts /tmp/ci-logs .
            exit 1
          }
          make docs-check > /tmp/ci-logs/docs-check.log 2>&1 || {
            echo "ERROR: Documentation drift detected."
            npx tsx scripts/ci/generate-manifest.ts /tmp/ci-logs .
            exit 1
          }
        fi
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ] && [ "$SYNC_ONLY" != "true" ]; then
          echo "Running coverage enforcement..."
          make test-coverage-ci > /tmp/ci-logs/coverage.log 2>&1 || {
            echo "ERROR: Coverage thresholds not met. See coverage report above."
            npx tsx scripts/ci/generate-manifest.ts /tmp/ci-logs .
            exit 1
          }
        fi
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ] && [ -n "$GITHUB_TOKEN" ] && [ "$TRUNK_SYNC_ENABLED" = "true" ]; then
          REPO="${HUB_URL:-${GITHUB_REPO:-serverlessclaw/serverlessclaw}}"
          echo "Finalizing trunk sync back to GitHub ($REPO) (QA verification passed)..."
          git config --global user.email "agent@serverlessclaw.local"
          git config --global user.name "Claw Coder Agent"
          
          if [ "$SYNC_MODE" = "push" ] && [ -n "$SUBTREE_PREFIX" ]; then
            echo "Performing subtree push for prefix: $SUBTREE_PREFIX..."
            git subtree push --prefix=$SUBTREE_PREFIX https://$GITHUB_TOKEN@github.com/$REPO.git main
          else
            git add .
            MSG="${COMMIT_MESSAGE:-chore: autonomous improvement by Claw Coder Agent [skip ci]}"
            if git commit -m "$MSG"; then
              git push https://$GITHUB_TOKEN@github.com/$REPO.git HEAD:main
            else
              echo "No changes to commit."
            fi
          fi
        elif [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ] && [ -n "$GITHUB_TOKEN" ]; then
          echo "Skipping trunk sync - TRUNK_SYNC_ENABLED not set (QA verification pending)"
        fi
artifacts:
  files:
    - '**/*'
    - 'failure-manifest.json'
    - '*.log'
